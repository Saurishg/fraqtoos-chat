<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FraqtoOS Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f0f; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }

  #topbar {
    background: #1a1a1a; border-bottom: 1px solid #2a2a2a;
    padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  #topbar h1 { font-size: 18px; color: #fff; font-weight: 600; }
  .ts-ip { color: #555; font-size: 11px; background: #2a2a2a; padding: 3px 8px; border-radius: 4px; }
  #model-select {
    margin-left: auto; background: #2a2a2a; border: 1px solid #3a3a3a;
    color: #e0e0e0; padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer;
  }
  #clear-btn {
    background: #2a2a2a; border: 1px solid #3a3a3a; color: #888;
    padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer;
  }
  #clear-btn:hover { color: #e0e0e0; }

  #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

  .msg { display: flex; gap: 10px; max-width: 84%; }
  .msg.user { margin-left: auto; flex-direction: row-reverse; }
  .bubble { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .user .bubble { background: #1e40af; color: #fff; border-radius: 12px 12px 2px 12px; }
  .bot  .bubble { background: #1e1e1e; color: #e0e0e0; border: 1px solid #2a2a2a; border-radius: 12px 12px 12px 2px; }
  .bot.claude .bubble { border-color: #7c3aed55; background: #1a1528; }

  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; background: #2a2a2a; }
  .user .avatar { background: #1e40af; }
  .claude .avatar { background: #2d1b69; }

  pre { background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 12px; overflow-x: auto; margin: 8px 0; }
  code { font-family: 'Courier New', monospace; font-size: 13px; }

  #model-label { color: #444; font-size: 11px; text-align: center; padding: 3px 0; }
  #model-label span { color: #666; }

  #inputbar { background: #1a1a1a; border-top: 1px solid #2a2a2a; padding: 14px 20px; display: flex; gap: 10px; align-items: flex-end; }
  #input {
    flex: 1; background: #2a2a2a; border: 1px solid #3a3a3a; color: #e0e0e0;
    padding: 10px 14px; border-radius: 8px; font-size: 14px; resize: none;
    min-height: 44px; max-height: 160px; outline: none; font-family: inherit; line-height: 1.5;
  }
  #input:focus { border-color: #3b82f6; }
  #send-btn { background: #1e40af; color: #fff; border: none; border-radius: 8px; padding: 10px 18px; font-size: 14px; cursor: pointer; height: 44px; }
  #send-btn:hover { background: #2563eb; }
  #send-btn:disabled { background: #222; color: #444; cursor: not-allowed; }
  #send-btn.claude-mode { background: #6d28d9; }
  #send-btn.claude-mode:hover { background: #7c3aed; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
</style>
</head>
<body>

<div id="topbar">
  <span>🤖</span>
  <h1>FraqtoOS Chat</h1>
  <span class="ts-ip">100.67.1.60:8080</span>
  <select id="model-select" onchange="onModelChange()">
    <optgroup label="── Local (Ollama) ──">
      <option value="phi4">phi4 — Fast (9 GB)</option>
      <option value="gemma4:latest">gemma4 — Balanced (9.6 GB)</option>
      <option value="qwen3:14b">qwen3:14b — Smart (9.3 GB)</option>
      <option value="llama4:latest">llama4 — Powerful (67 GB)</option>
    </optgroup>
    <optgroup label="── Claude (Anthropic) ──">
      <option value="claude-sonnet-4-6">Claude Sonnet 4.6 ⚡</option>
      <option value="claude-opus-4-7">Claude Opus 4.7 🧠</option>
      <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 💨</option>
    </optgroup>
  </select>
  <button id="clear-btn" onclick="clearChat()">Clear</button>
</div>

<div id="chat">
  <div class="msg bot">
    <div class="avatar">🤖</div>
    <div class="bubble">Hi! I'm FraqtoOS Chat. Select a model above and start chatting.</div>
  </div>
</div>

<div id="model-label">Using: <span id="model-name">phi4</span></div>

<div id="inputbar">
  <textarea id="input" placeholder="Ask anything... (Shift+Enter for new line)" rows="1"></textarea>
  <button id="send-btn" onclick="send()">Send ➤</button>
</div>

<script>
const chat        = document.getElementById('chat');
const input       = document.getElementById('input');
const sendBtn     = document.getElementById('send-btn');
const modelSelect = document.getElementById('model-select');
const modelLabel  = document.getElementById('model-name');

const CLAUDE_MODELS = new Set(['claude-sonnet-4-6','claude-opus-4-7','claude-haiku-4-5-20251001']);
let history = [];

function isClaude() { return CLAUDE_MODELS.has(modelSelect.value); }

function onModelChange() {
  modelLabel.textContent = modelSelect.value;
  sendBtn.className = isClaude() ? 'claude-mode' : '';
}

input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
input.addEventListener('input', function() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 160) + 'px';
});

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderText(text) {
  // code blocks
  var html = escHtml(text);
  html = html.replace(/```[\w]*\n([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  return html;
}

function addMsg(role, isClaudeMsg) {
  var div = document.createElement('div');
  div.className = 'msg ' + role + (isClaudeMsg ? ' claude' : '');
  var avatar = role === 'user' ? '👤' : (isClaudeMsg ? '✦' : '🤖');
  div.innerHTML = '<div class="avatar">' + avatar + '</div><div class="bubble"></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div.querySelector('.bubble');
}

function clearChat() {
  history = [];
  chat.innerHTML = '<div class="msg bot"><div class="avatar">🤖</div><div class="bubble">Chat cleared.</div></div>';
}

async function send() {
  var text = input.value.trim();
  if (!text || sendBtn.disabled) return;
  input.value = '';
  input.style.height = '44px';
  sendBtn.disabled = true;

  var model = modelSelect.value;
  var claudeMsg = isClaude();

  var ub = addMsg('user', false);
  ub.innerHTML = renderText(text);
  history.push({ role: 'user', content: text });

  var bubble = addMsg('bot', claudeMsg);
  bubble.textContent = '...';

  try {
    var res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: model, messages: history })
    });

    if (!res.ok) {
      bubble.textContent = 'HTTP Error: ' + res.status;
      sendBtn.disabled = false;
      return;
    }

    var reader = res.body.getReader();
    var decoder = new TextDecoder();
    var full = '';
    bubble.textContent = '';

    while (true) {
      var r = await reader.read();
      if (r.done) break;
      var lines = decoder.decode(r.value).split('\n');
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line) continue;
        try {
          var d = JSON.parse(line);
          if (d.token) {
            full += d.token;
            bubble.innerHTML = renderText(full);
            chat.scrollTop = chat.scrollHeight;
          }
          if (d.error) {
            bubble.textContent = 'Error: ' + d.error;
          }
        } catch(e) {}
      }
    }
    history.push({ role: 'assistant', content: full });
  } catch(e) {
    bubble.textContent = 'Network error: ' + e.message;
  }

  sendBtn.disabled = false;
  input.focus();
}
</script>
</body>
</html>
